apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: app-ingress
  namespace: {{ .Values.namespace }}

spec:
  ingressClassName: nginx

  rules:
  - http:

      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-service

            port:
              number: {{ .Values.frontend.service.port }}

      - path: /health
        pathType: Prefix

        backend:
          service:
            name: backend-service

            port:
              number: {{ .Values.backend.service.port }}

      - path: /metrics
        pathType: Prefix

        backend:
          service:
            name: backend-service

            port:
              number: {{ .Values.backend.service.port }}
apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
      - name: prometheus

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        args:
        - --config.file=/etc/prometheus/prometheus.yml

        ports:
        - containerPort: 9090

        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus

      volumes:
      - name: prometheus-config

        configMap:
          name: prometheus-config
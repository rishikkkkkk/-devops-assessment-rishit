name: Assessment CI/CD

on:
  push:
    branches:
      - main

jobs:

  helm-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: |
          helm lint helm/devops-app

  docker-build-push:
    runs-on: ubuntu-latest

    needs: helm-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend
      - name: Build Backend
        run: |
          docker build \
            -t rishikkk/backend:${{ github.sha }} \
            app/backend

      - name: Push Backend
        run: |
          docker push rishikkk/backend:${{ github.sha }}

      # Frontend
      - name: Build Frontend
        run: |
          docker build \
            -t rishikkk/frontend:${{ github.sha }} \
            app/frontend

      - name: Push Frontend
        run: |
          docker push rishikkk/frontend:${{ github.sha }}
